# ============================================================
# Configuração usada APENAS durante os testes (./mvnw test)
# Substitui o src/main/resources/application.properties
# O MySQL não é tocado — tudo roda em memória
# ============================================================

# Banco H2 em memória — sobe junto com os testes e some ao final
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate cria as tabelas automaticamente a partir das entidades
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT com segredo fixo para testes (mínimo 32 caracteres exigido pelo JwtService)
jwt.secret=segredo-de-teste-com-minimo-de-32-caracteres-aqui
jwt.expiration=3600000

# E-mail desabilitado nos testes (substituído por @MockBean no FinanceiroApplicationTests)
spring.mail.host=localhost
spring.mail.port=3025
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Evita o anti-pattern Open Session in View durante os testes também
spring.jpa.open-in-view=false


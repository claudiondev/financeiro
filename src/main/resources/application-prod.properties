# 1. NOME DA APLICACAO
spring.application.name=financeiro

# 2. CONEXAO COM O MYSQL (VARIAVEIS DO RAILWAY - NUNCA EXPOR VALORES REAIS)
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Hibernate / JPA
# show-sql=false em producao para nao expor queries nos logs
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. CONFIGURACAO DE E-MAIL (VARIAVEIS DO RAILWAY)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 5. PORTA DO SERVIDOR
server.port=8080
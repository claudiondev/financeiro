# 1. NOME DA APLICAÇÃO
spring.application.name=financeiro

# 2. CONEXÃO COM O MYSQL (LINUX)
# O parâmetro 'createDatabaseIfNotExist=true' criará o banco 'db_studio_financeiro' sozinho
spring.datasource.url=jdbc:mysql://localhost:3306/db_studio_financeiro?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. CONFIGURAÇÃO DO HIBERNATE / JPA
# 'update' cria as tabelas no MySQL automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. CONFIGURAÇÃO DE E-MAIL (GMAIL)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=claudinhon152@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 5. PORTA DO SERVIDOR
server.port=8080